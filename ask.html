# **📘 MATHÉMATIQUES**

### **🔵 QCM (3 choix)**

* Combien fait 7 × 8 ? A) 54 B) 56 C) 58 **Réponse : B**  
* Quel nombre est premier ? A) 9 B) 11 C) 15 **Réponse : B**  
* 1/2 \+ 1/2 \= ? A) 1 B) 2 C) 1/4 **Réponse : A**  
* 25% de 100 \= ? A) 20 B) 25 C) 30 **Réponse : B**  
* Un carré a combien de côtés ? A) 3 B) 4 C) 5 **Réponse : B**

  ### **🟢 Une réponse**

* Résultat de 12² \= **144**  
* Nom d’un triangle avec 3 côtés égaux : **Triangle équilatéral**  
* 1000 mètres \= **1 km**  
* 10 × 0 \= **0**  
* Racine carrée de 49 \= **7**

  ### **🟣 Plusieurs bonnes réponses**

* Nombres pairs : A) 2 B) 3 C) 4 D) 7 E) 10 **Réponses : A, C, E**  
* Multiples de 5 : A) 10 B) 12 C) 15 D) 20 E) 23 **Réponses : A, C, D**  
* Fractions correctes : A) 1/2 B) 2/2 C) 3/4 D) 5/0 E) 4/8 **Réponses : A, B, C, E (5/0 est impossible)**  
* Résultats corrects de 3×?=9 : A) 2 B) 3 C) 4 D) 1 E) 5 **Réponse : B**  
* Nombres supérieurs à 10 : A) 8 B) 12 C) 15 D) 9 E) 20 **Réponses : B, C, E**

* Qui était Napoléon ? A) Roi B) Empereur C) Président **Réponse : B**
