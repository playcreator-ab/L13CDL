<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les 13 Coups de Léon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .slide-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
        }

        .slide-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            transition: opacity 0.3s ease-in-out;
        }

        /* Widget Chronomètre */
        #timer-widget {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 40;
            border-radius: 8px;
        }

        #timer-display {
            font-size: 12rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }

        .controls-bar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            padding: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-base {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-slide {
            background: #334155;
            color: #cbd5e1;
        }

        .btn-slide:hover {
            background: #475569;
            color: white;
        }

        .btn-slide.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        .btn-timer {
            background: #7c3aed;
            color: white;
        }

        .btn-timer:hover {
            background: #8b5cf6;
        }

        .audio-btn {
            background: #1e293b;
            border: 1px solid #475569;
            color: #94a3b8;
        }

        .audio-btn.playing {
            border-color: #10b981;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4); }
            100% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        }

        .divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            margin: 0 8px;
        }
    </style>
</head>
<body>

    <!-- Zone d'affichage -->
    <div class="slide-container">
        <!-- Widget Timer -->
        <div id="timer-widget">
            <div class="text-blue-400 text-xl font-bold mb-4 uppercase tracking-widest">Temps restant</div>
            <div id="timer-display">5</div>
        </div>
        
        <img id="mainSlide" src="" alt="Slide" class="slide-image" onerror="this.src='https://via.placeholder.com/1280x720/1e293b/ffffff?text=Lien+Image+Invalide'">
    </div>

    <!-- Barre de contrôles compacte -->
    <div class="controls-bar">
        <div class="max-w-full mx-auto flex items-center justify-center flex-wrap gap-2">
            
            <!-- Musiques -->
            <div class="flex items-center gap-2">
                <button onclick="toggleAudio('lob')" id="btn-lob" class="btn-base audio-btn">
                    <span id="icon-lob">▶</span> LOB
                </button>
                <button onclick="toggleAudio('med')" id="btn-med" class="btn-base audio-btn">
                    <span id="icon-med">▶</span> MED
                </button>
                <button onclick="toggleAudio('adv')" id="btn-adv" class="btn-base audio-btn">
                    <span id="icon-adv">▶</span> ADV
                </button>
            </div>

            <div class="divider"></div>

            <!-- Slides -->
            <div class="flex items-center gap-2">
                <button onclick="changeSlide('titre', this)" class="btn-base btn-slide active">Titre</button>
                <button onclick="changeSlide('logo', this)" class="btn-base btn-slide">Logo</button>
                <button onclick="changeSlide('regle', this)" class="btn-base btn-slide">Règle</button>
                <button onclick="changeSlide('duel', this)" class="btn-base btn-slide">Duel</button>
                <button onclick="changeSlide('quest', this)" class="btn-base btn-slide">Quest</button>
                <button onclick="changeSlide('class', this)" class="btn-base btn-slide">Class</button>
                <button onclick="changeSlide('fin', this)" class="btn-base btn-slide">Fin</button>
            </div>

            <div class="divider"></div>

            <!-- Chrono -->
            <button onclick="startTimer()" class="btn-base btn-timer">
                <span>⏱</span> Timer 5s
            </button>
        </div>
    </div>

    <!-- Éléments Audio -->
    <audio id="audio-lob" loop></audio>
    <audio id="audio-med" loop></audio>
    <audio id="audio-adv" loop></audio>

    <script>
        // --- CONFIGURATION DES LIENS ---
        const links = {
            images: {
                titre: "https://i.ibb.co/QvM3LTwH/1.png",
                logo: "https://i.ibb.co/6cwck10w/2.png",
                regle: "https://i.ibb.co/TMdn0X0b/3.png",
                duel: "https://i.ibb.co/LDNf9rd2/4.png",
                quest: "https://i.ibb.co/7tSkwYsd/5.png",
                class: "https://i.ibb.co/nq9XHYcf/6.png",
                fin: "https://i.ibb.co/6JRz40Th/7.png"
            },
            audio: {
                lob: "https://github.com/playcreator-ab/L13CDL/raw/refs/heads/main/Lobby%20Music%20(Original%20Soundtrack).mp3",
                med: "https://github.com/playcreator-ab/L13CDL/raw/refs/heads/main/The%2020%20Second%20Answer%20Medley.mp3",
                adv: "https://github.com/playcreator-ab/L13CDL/raw/refs/heads/main/Lobby%20Music%20Adventure%20Edition.mp3"
            }
        };

        let currentPlaying = null;
        let timerInterval = null;

        // Initialisation
        window.onload = () => {
            document.getElementById('mainSlide').src = links.images.titre;
            document.getElementById('audio-lob').src = links.audio.lob;
            document.getElementById('audio-med').src = links.audio.med;
            document.getElementById('audio-adv').src = links.audio.adv;
        };

        function changeSlide(key, element) {
            stopTimer(); // Arrêter le timer si on change de slide
            const img = document.getElementById('mainSlide');
            img.style.opacity = 0;
            
            setTimeout(() => {
                img.src = links.images[key];
                img.style.opacity = 1;
            }, 200);

            document.querySelectorAll('.btn-slide').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        // --- Logique du Timer ---
        function startTimer() {
            stopTimer(); // Reset si déjà lancé
            
            const widget = document.getElementById('timer-widget');
            const display = document.getElementById('timer-display');
            let timeLeft = 5;

            widget.style.display = 'flex';
            display.innerText = timeLeft;

            timerInterval = setInterval(() => {
                timeLeft--;
                display.innerText = timeLeft;

                if (timeLeft <= 0) {
                    stopTimer();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-widget').style.display = 'none';
        }

        function toggleAudio(id) {
            const audio = document.getElementById('audio-' + id);
            const btn = document.getElementById('btn-' + id);
            const icon = document.getElementById('icon-' + id);

            if (currentPlaying === id) {
                audio.pause();
                resetAudioUI(id);
                currentPlaying = null;
            } else {
                if (currentPlaying) {
                    document.getElementById('audio-' + currentPlaying).pause();
                    resetAudioUI(currentPlaying);
                }

                audio.play().catch(e => showError("Lien audio invalide : " + links.audio[id]));
                
                btn.classList.add('playing');
                icon.innerText = '⏸';
                currentPlaying = id;
            }
        }

        function resetAudioUI(id) {
            const btn = document.getElementById('btn-' + id);
            const icon = document.getElementById('icon-' + id);
            if(btn) btn.classList.remove('playing');
            if(icon) icon.innerText = '▶';
        }

        function showError(msg) {
            const div = document.createElement('div');
            div.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-red-600 text-white px-4 py-2 rounded text-sm z-50";
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
    </script>
</body>
</html>
